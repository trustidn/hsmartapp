# =============================================================================
# HSmart Production Docker Compose
# =============================================================================
# Prerequisites:
#   - PostgreSQL on HOST (not in container)
#   - Ubuntu: add host.docker.internal via extra_hosts
#   - Run migrations manually on host DB before first start
#
# Usage:
#   docker compose -f docker-compose.production.yml up -d
# =============================================================================

services:
  hsmart:
    build:
      context: .
      dockerfile: Dockerfile
    image: hsmart:latest
    container_name: hsmart-app
    restart: always

    ports:
      - "8080:8080"

    environment:
      # Database (host PostgreSQL)
      DATABASE_URL: postgres://${DB_USER:-hsmartapp_user}:${DB_PASSWORD:-P4ssword90901}@${DB_HOST:-host.docker.internal}:${DB_PORT:-5432}/${DB_NAME:-hsmartapp_saas}?sslmode=disable

      # Security (REQUIRED - override in .env)
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}

      # Application
      HTTP_ADDR: :8080
      STATIC_DIR: /app/static
      UPLOAD_DIR: /app/uploads
      BASE_URL: ${BASE_URL:-}

      # Redis (optional - leave empty to disable report cache)
      REDIS_ADDR: ${REDIS_ADDR:-}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}

    volumes:
      - hsmart_uploads:/app/uploads

    # Resource limits for 4GB RAM server
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1"
        reservations:
          memory: 256M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    # Host PostgreSQL access (Linux)
    extra_hosts:
      - "host.docker.internal:host-gateway"

    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  hsmart_uploads:
